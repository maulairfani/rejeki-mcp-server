<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Budget Allocator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e9ecef;
  --text: #212529;
  --muted: #6c757d;
  --primary: #2563eb;
  --success: #16a34a;
  --danger: #dc2626;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111827;
    --surface: #1f2937;
    --border: #374151;
    --text: #f3f4f6;
    --muted: #9ca3af;
  }
}

body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

#loading {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: var(--muted); gap: 8px;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.app-title { font-weight: 700; font-size: 15px; }
.period-select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius);
  padding: 4px 8px; font-size: 13px; cursor: pointer;
}
.rta-block { text-align: right; }
.rta-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; }
.rta-value { font-size: 20px; font-weight: 800; line-height: 1.2; }
.pos { color: var(--success); }
.neg { color: var(--danger); }
.zero { color: var(--muted); }

/* ── Content ── */
.content { padding: 12px 16px 80px; }

.group { margin-bottom: 20px; }
.group-name {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  padding-bottom: 6px; margin-bottom: 2px;
  border-bottom: 1px solid var(--border);
}

.env-row {
  display: grid;
  grid-template-columns: 26px 1fr auto 110px 72px;
  align-items: center;
  gap: 8px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.env-row:last-child { border-bottom: none; }

.env-icon { font-size: 17px; text-align: center; }
.env-info {}
.env-name { font-weight: 600; font-size: 13px; }
.env-avail { font-size: 11px; color: var(--muted); margin-top: 2px; }
.env-avail.neg { color: var(--danger); }

.target-badge {
  font-size: 10px; padding: 2px 6px; border-radius: 10px;
  font-weight: 600; white-space: nowrap;
}
.funded { background: #dcfce7; color: #15803d; }
.underfunded { background: #fef9c3; color: #854d0e; }
@media (prefers-color-scheme: dark) {
  .funded { background: #14532d; color: #4ade80; }
  .underfunded { background: #422006; color: #fde047; }
}

.amount-input {
  width: 100%; text-align: right;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 5px 8px; background: var(--bg); color: var(--text);
  font-size: 13px; font-family: var(--font);
  transition: border-color 0.15s;
}
.amount-input:focus { outline: none; border-color: var(--primary); }
.amount-input.dirty { border-color: var(--primary); }

.assign-btn {
  background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius);
  padding: 5px 0; width: 100%; cursor: pointer;
  font-size: 12px; font-weight: 600;
  transition: opacity 0.15s, background 0.2s;
}
.assign-btn:hover:not(:disabled) { opacity: 0.85; }
.assign-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.assign-btn.ok { background: var(--success); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 18px;
  font-size: 13px; opacity: 0; transition: opacity 0.25s;
  pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  white-space: nowrap;
}
.toast.show { opacity: 1; }
.toast.ok { border-left: 3px solid var(--success); }
.toast.err { border-left: 3px solid var(--danger); }
</style>
</head>
<body>

<div id="loading">⏳ Memuat data budget...</div>

<div id="app" style="display:none">
  <header>
    <div class="header-left">
      <span class="app-title">💰 Budget Allocator</span>
      <select id="period-sel" class="period-select"></select>
    </div>
    <div class="rta-block">
      <span class="rta-label">Ready to Assign</span>
      <span id="rta" class="rta-value zero">Rp 0</span>
    </div>
  </header>
  <div class="content" id="list"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── Formatting ────────────────────────────────────────────────────────────────
const fmt  = n => new Intl.NumberFormat('id-ID').format(Math.round(n));
const parse = s => parseFloat(String(s).replace(/\D/g, '')) || 0;

// ── MCP postMessage bridge ────────────────────────────────────────────────────
let _id = 1;
const _pending = new Map();

function rpc(method, params) {
  return new Promise((res, rej) => {
    const id = _id++;
    _pending.set(id, { res, rej });
    window.parent.postMessage({ jsonrpc: '2.0', id, method, params }, '*');
    setTimeout(() => {
      if (_pending.has(id)) {
        _pending.delete(id);
        rej(new Error('timeout'));
      }
    }, 15000);
  });
}

window.addEventListener('message', e => {
  const m = e.data;
  if (!m || m.jsonrpc !== '2.0') return;
  if (m.id != null && _pending.has(m.id)) {
    const { res, rej } = _pending.get(m.id);
    _pending.delete(m.id);
    m.error ? rej(m.error) : res(m.result);
    return;
  }
  if (m.method === 'ui/notifications/tool-result') onData(m.params);
});

// ── Handshake ─────────────────────────────────────────────────────────────────
rpc('ui/initialize', {
  name: 'Rejeki Budget Allocator', version: '1.0.0',
  protocolVersion: '2024-11-05',
  appCapabilities: { availableDisplayModes: ['inline', 'fullscreen'], tools: { listChanged: false } }
}).catch(() => {});

// ── Tool call helper ──────────────────────────────────────────────────────────
async function callTool(name, args) {
  const r = await rpc('tools/call', { name, arguments: args });
  if (r?.structuredContent) return r.structuredContent;
  const text = r?.content?.[0]?.text;
  if (text) { try { return JSON.parse(text); } catch { return text; } }
  return r;
}

// ── Data handler ──────────────────────────────────────────────────────────────
function onData(params) {
  const raw = params?.structuredContent ?? params?.content?.[0]?.text;
  if (!raw) return;
  const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
  render(data);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';

  updateRta(data.ready_to_assign ?? 0);

  // Period selector (populate once)
  const sel = document.getElementById('period-sel');
  if (!sel.options.length) {
    const [y, m] = (data.period || '').split('-').map(Number);
    for (let i = 0; i < 6; i++) {
      let mo = m - i, yr = y;
      if (mo <= 0) { mo += 12; yr--; }
      const v = `${yr}-${String(mo).padStart(2, '0')}`;
      const o = new Option(v, v);
      if (v === data.period) o.selected = true;
      sel.add(o);
    }
    sel.onchange = () => callTool('budget_allocator', { period: sel.value });
  }

  // Envelopes
  const list = document.getElementById('list');
  list.innerHTML = '';

  for (const [groupName, group] of Object.entries(data.groups || {})) {
    const g = document.createElement('div');
    g.className = 'group';
    g.innerHTML = `<div class="group-name">${groupName}</div>`;

    for (const env of group.envelopes || []) {
      const avail = env.available ?? 0;
      const assigned = env.assigned ?? 0;

      let badgeHtml = '';
      if (env.target) {
        const funded = env.target.status === 'funded';
        badgeHtml = `<span class="target-badge ${funded ? 'funded' : 'underfunded'}">
          ${funded ? '✓ Funded' : `Target: Rp ${fmt(env.target.amount)}`}
        </span>`;
      }

      const row = document.createElement('div');
      row.className = 'env-row';
      row.innerHTML = `
        <span class="env-icon">${env.icon || '📁'}</span>
        <div class="env-info">
          <div class="env-name">${env.name}</div>
          <div class="env-avail ${avail < 0 ? 'neg' : ''}">Available: Rp ${fmt(avail)}</div>
        </div>
        <div>${badgeHtml}</div>
        <input class="amount-input" type="text" inputmode="numeric"
               value="${fmt(assigned)}"
               data-orig="${assigned}" data-id="${env.id}" data-name="${env.name}" data-period="${data.period}">
        <button class="assign-btn" data-id="${env.id}">Assign</button>
      `;

      const inp = row.querySelector('.amount-input');
      const btn = row.querySelector('.assign-btn');

      inp.addEventListener('focus', () => inp.select());
      inp.addEventListener('blur', () => { inp.value = fmt(parse(inp.value)); });
      inp.addEventListener('input', () => {
        inp.classList.toggle('dirty', parse(inp.value) !== parseFloat(inp.dataset.orig));
      });

      btn.addEventListener('click', async () => {
        const amount = parse(inp.value);
        btn.disabled = true; btn.textContent = '...';
        try {
          await callTool('finance_assign_to_envelope', {
            envelope_id: parseInt(inp.dataset.id),
            amount,
            period: inp.dataset.period,
          });
          inp.dataset.orig = amount;
          inp.classList.remove('dirty');
          btn.classList.add('ok'); btn.textContent = '✓';
          toast(`✓ ${inp.dataset.name}: Rp ${fmt(amount)}`, 'ok');
          setTimeout(() => { btn.classList.remove('ok'); btn.textContent = 'Assign'; }, 1800);

          // Refresh RTA
          const rta = await callTool('finance_get_ready_to_assign', { period: inp.dataset.period });
          if (rta?.ready_to_assign !== undefined) updateRta(rta.ready_to_assign);
        } catch (err) {
          toast('Gagal: ' + (err?.message || JSON.stringify(err)), 'err');
          btn.textContent = 'Assign';
        }
        btn.disabled = false;
      });

      g.appendChild(row);
    }
    list.appendChild(g);
  }
}

function updateRta(val) {
  const el = document.getElementById('rta');
  el.textContent = 'Rp ' + fmt(val);
  el.className = 'rta-value ' + (val > 1 ? 'pos' : val < -1 ? 'neg' : 'zero');
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
