<!DOCTYPE html>
<html>
<head>
  <title>Rejeki{% block title %}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f9fafb; color: #111; }
    nav {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { font-weight: 700; font-size: 18px; color: #16a34a; text-decoration: none; }
    nav .user { font-size: 14px; color: #6b7280; display: flex; align-items: center; gap: 12px; }
    nav .user a { color: #6b7280; text-decoration: none; font-size: 13px; }
    nav .user a:hover { color: #111; }
    main { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="brand" href="/">Rejeki</a>
    <div class="user">
      <span>{{ username }}</span>
      <a href="/logout">Sign Out</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
